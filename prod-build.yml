trigger:
  tags:
    include:
      - v* # Run on all tags starting with 'v'
pr:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: templates
      type: git
      name: "Web Development/Pipelines"

jobs:
  - template: build/dotnet.yml@templates
    parameters:
      prebuildSteps:
        - task: Npm@1
          inputs:
            command: "install"
            workingDir: "CSIDE.Web"
        - task: Npm@1
          displayName: "Webpack Build (prod)"
          inputs:
            command: "custom"
            customCommand: "run build"
            workingDir: "CSIDE.Web"
  - template: deploy/iis.yml@templates
    parameters:
      environment: "cside-staging"
      websiteName: "gi-staging"
      virtualApplication: "cside"
      jobName: "Deploy_To_Staging"
      variableGroups:
        - "cside-staging-properties"
      projectName: "CSIDE.Web"
      dependsOn: build
